name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: catalog
          POSTGRES_USER: catalog_user
          POSTGRES_PASSWORD: catalog_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U catalog_user -d catalog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Run tests
        run: ./gradlew test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/catalog
          SPRING_DATASOURCE_USERNAME: catalog_user
          SPRING_DATASOURCE_PASSWORD: catalog_pass

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          ./gradlew bootJar
          docker build -t product-catalog-api:${{ github.sha }} .
